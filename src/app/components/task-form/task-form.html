<form [formGroup]="form" (ngSubmit)="submit()" class="task-form">
  <div class="form-field">
    <label class="field-label">TASK NAME *</label>
    <input pInputText formControlName="name" placeholder="e.g. fetch-customers-q4" class="w-full" />
  </div>

  <div class="form-field">
    <label class="field-label">DATA TYPE *</label>
    <app-type-selector
      [options]="dataTypeOptions"
      [value]="form.controls.dataType.value"
      (valueChange)="form.controls.dataType.setValue($event)"
    />
  </div>

  <div class="slider-row">
    <div class="slider-field">
      <div class="slider-header">
        <label class="field-label">AMOUNT</label>
        <span class="slider-value">{{ form.controls.amount.value }}</span>
      </div>
      <p-slider formControlName="amount" [min]="5" [max]="80" />
    </div>

    <div class="slider-field">
      <div class="slider-header">
        <label class="field-label">INTERVAL</label>
        <span class="slider-value">{{ form.controls.interval.value }}s</span>
      </div>
      <p-slider formControlName="interval" [min]="0.5" [max]="5" [step]="0.5" />
    </div>
  </div>

  <div class="endpoint-display">
    <label class="field-label">API ENDPOINT</label>
    <span class="endpoint-url">{{ apiEndpoint }}</span>
  </div>

  <p-button
    type="submit"
    label="Start Collection"
    icon="pi pi-play"
    styleClass="w-full start-btn"
    [disabled]="form.invalid"
  />
</form>
